[tool.black]
exclude = '''
\.git
| \.venv
| _build
| buck-out
| venv
| logs
| data
| mock_data
| mock_database
| templates
| .vscode
| .github
| makefile
| README.md
| requirements.txt
| docker-compose.yaml
| docker-compose.prod.yaml
'''

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--cov=modules",
    "--cov=cogs",
    "--cov-report=term-missing",
]
asyncio_mode = "auto"
