services:
  poliswag:
    build: .
    image: poliswag
    container_name: poliswag
    restart: unless-stopped
    init: true
    ports:
      - "8989:8989"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - /root/PoGoLeiria/apps/quests/public:/pogo-public
      - /root/PoGoLeiria/apps/dex/public:/dex-public
      - /root/.android:/root/.android:ro
    env_file:
      - .env
    networks:
      - scanner
    logging:
      driver: json-file
      options:
        max-size: "10m"

networks:
  scanner:
    external: true
