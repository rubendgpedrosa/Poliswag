# pre-commit configuration
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
        description: "Ruff: fast Python linter (catches unused imports, dead code, etc.)"

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3
        description: "Black: Python code formatter"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        description: "Trims trailing whitespace from all files"
      - id: end-of-file-fixer
        description: "Ensures files end with a newline"
        exclude: ^(logs/|mock_database/|mock_data/|data/|templates/|\.github/)
      - id: check-yaml
        description: "Validates YAML syntax"
      - id: check-toml
        description: "Validates TOML syntax"
      - id: check-case-conflict
        description: "Detects filenames that conflict on case-insensitive filesystems"
      - id: mixed-line-ending
        description: "Normalises mixed line endings"
        args: [--fix=lf]
      - id: check-added-large-files
        description: "Prevents giant files from being committed"
        exclude: ^mock_database/.*\.sql$
      - id: check-merge-conflict
        description: "Checks for files containing merge conflict strings"
      - id: detect-private-key
        description: "Checks for presence of private keys"

fail_fast: false

# 1. pip install pre-commit
# 2. pre-commit install
